name: Run Postman API Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  newman-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman and Reporter
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run Newman Tests
        run: |
          newman run GoRest-Production.postman_collection.json \
            --env-var "base_url=https://gorest.co.in/public/v2" \
            --env-var "api_token=${{ secrets.GOREST_TOKEN }}" \
            --global-var "User-Agent=Mozilla/5.0" \
            --header "Accept: application/json" \
            --header "Content-Type: application/json" \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export report.html

      - name: Upload Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: postman-report
          path: report.html
