- name: Run Postman API Tests

on:
  push:
    branches: [ main ]

jobs:
  newman-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run Newman Tests
        run: |
          newman run GoRest-Production.postman_collection.json \
          --env-var "base_url=https://gorest.co.in/public/v2" \
          --env-var "api_token=${{ secrets.GOREST_TOKEN }}" \
          --header "User-Agent: PostmanRuntime/7.31.1" \
          --reporters cli,htmlextra \
          --reporter-htmlextra-export report.html

      - name: Upload Report
        uses: actions/upload-artifact@v4
        if: always()  # This ensures the report uploads even if tests fail
        with:
          name: postman-report
          path: report.html
